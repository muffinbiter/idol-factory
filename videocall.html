<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>Idol Factory - 팬영통</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #FFB7C5; --lavender: #D4B8E0; --mint: #B8E8D0; --yellow: #FFF3B0;
    --pink-dark: #FF85A1; --lavender-dark: #A98BC8;
    --window-bg: #F0F8FF; --border: #8B7BB8; --text-dark: #3D2C6B;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0D0820;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .phone-frame {
    width: 390px; height: 844px;
    position: relative; overflow: hidden;
    box-shadow: 0 0 0 3px var(--border), 6px 6px 0 3px var(--lavender-dark);
    background: #0D0820;
  }

  /* Scene management */
  .scene {
    position: absolute; inset: 0;
    opacity: 0; pointer-events: none;
    transition: opacity 0.5s ease;
  }
  .scene.active { opacity: 1; pointer-events: all; }

  /* ========== SCENE 1: 연결 중 ========== */
  #scene1 {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #0D0820;
  }
  .s1-img-wrap {
    position: relative; width: 180px; height: 180px; margin-bottom: 24px;
  }
  .s1-img-wrap img {
    width: 100%; height: 100%; object-fit: cover; object-position: top;
    border-radius: 50%; border: 3px solid #6B4B9B;
    filter: grayscale(100%) brightness(0.7);
    display: block;
  }
  .s1-ring {
    position: absolute; inset: -8px;
    border-radius: 50%; border: 2px solid rgba(180,120,255,0.4);
    animation: ringPulse 1.5s ease-in-out infinite;
  }
  .s1-ring2 {
    position: absolute; inset: -16px;
    border-radius: 50%; border: 2px solid rgba(180,120,255,0.2);
    animation: ringPulse 1.5s ease-in-out infinite 0.4s;
  }
  @keyframes ringPulse {
    0%,100% { transform: scale(1); opacity: 0.4; }
    50% { transform: scale(1.05); opacity: 1; }
  }
  .s1-name {
    font-family: 'Press Start 2P', monospace; font-size: 14px;
    color: white; margin-bottom: 12px;
    text-shadow: 0 0 12px rgba(180,120,255,0.8);
  }
  .s1-status {
    font-size: 14px; color: rgba(220,200,255,0.8); margin-bottom: 32px;
    display: flex; align-items: center; gap: 4px;
  }
  .connecting-dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--lavender);
    animation: dotBounce 1s infinite;
  }
  .connecting-dot:nth-child(2) { animation-delay: 0.2s; }
  .connecting-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotBounce {
    0%,60%,100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }
  .cancel-btn {
    font-family: 'Press Start 2P', monospace; font-size: 8px;
    background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7);
    border: 2px solid rgba(255,255,255,0.2); padding: 10px 20px;
    cursor: pointer; border-radius: 2px;
    transition: all 0.2s;
  }
  .cancel-btn:hover { background: rgba(255,255,255,0.2); }

  /* ========== SCENE 2: 영통 메인 ========== */
  #scene2 { background: #0D0820; }

  /* Video / image background */
  .call-video {
    position: absolute; inset: 0; z-index: 1;
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .call-overlay {
    position: absolute; inset: 0; z-index: 2;
    background: linear-gradient(
      180deg,
      rgba(13,8,32,0.5) 0%,
      rgba(13,8,32,0.0) 25%,
      rgba(13,8,32,0.0) 55%,
      rgba(13,8,32,0.75) 80%,
      rgba(13,8,32,0.95) 100%
    );
  }
  /* Bokeh overlay */
  .call-bokeh {
    position: absolute; inset: 0; z-index: 2; pointer-events: none;
    background: radial-gradient(ellipse at 20% 30%, rgba(255,120,180,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(140,80,220,0.08) 0%, transparent 60%);
  }

  /* Top bar */
  .call-topbar {
    position: absolute; top: 0; left: 0; right: 0; z-index: 10;
    padding: 14px 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .call-badge {
    display: flex; align-items: center; gap: 6px;
    background: rgba(13,8,32,0.6); border: 1.5px solid rgba(180,120,255,0.4);
    padding: 6px 12px; border-radius: 2px;
  }
  .call-badge-dot {
    width: 8px; height: 8px; border-radius: 50%; background: #FF4444;
    animation: recPulse 1s ease-in-out infinite;
  }
  @keyframes recPulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .call-badge-text {
    font-family: 'Press Start 2P', monospace; font-size: 7px; color: white;
  }
  .call-timer {
    font-family: 'Press Start 2P', monospace; font-size: 11px;
    color: white; background: rgba(13,8,32,0.6);
    border: 1.5px solid rgba(180,120,255,0.4);
    padding: 6px 12px; border-radius: 2px;
    text-shadow: 0 0 8px rgba(180,120,255,0.6);
  }

  /* Chat overlay area */
  .call-chat-area {
    position: absolute; bottom: 130px; left: 0; right: 0; z-index: 10;
    padding: 0 14px;
    display: flex; flex-direction: column; gap: 8px;
    max-height: 260px; overflow: hidden;
    justify-content: flex-end;
  }
  .call-bubble {
    background: rgba(13,8,32,0.75); border: 1.5px solid rgba(180,120,255,0.5);
    color: #F0E8FF; font-size: 13px; line-height: 1.5;
    padding: 10px 14px; border-radius: 2px; border-bottom-left-radius: 0;
    max-width: 260px; align-self: flex-start;
    animation: bubbleSlide 0.25s ease;
    box-shadow: 2px 2px 0 rgba(107,75,155,0.5);
  }
  .call-bubble.user {
    background: rgba(255,133,161,0.85); color: white;
    border-color: rgba(255,183,197,0.6); align-self: flex-end;
    border-bottom-left-radius: 2px; border-bottom-right-radius: 0;
  }
  @keyframes bubbleSlide {
    0%{transform:translateY(8px);opacity:0}
    100%{transform:translateY(0);opacity:1}
  }
  .bubble-name {
    font-family: 'Press Start 2P', monospace; font-size: 6px;
    color: var(--lavender); margin-bottom: 4px;
  }

  /* Quick replies */
  .call-quick {
    position: absolute; bottom: 72px; left: 0; right: 0; z-index: 10;
    padding: 0 14px;
    display: flex; gap: 7px; overflow-x: auto;
    scrollbar-width: none;
  }
  .call-quick::-webkit-scrollbar { display: none; }
  .call-quick-btn {
    font-family: 'Noto Sans KR', sans-serif; font-size: 12px; font-weight: 700;
    padding: 7px 12px; white-space: nowrap; flex-shrink: 0;
    background: rgba(13,8,32,0.75); color: #F0E8FF;
    border: 1.5px solid rgba(180,120,255,0.5);
    cursor: pointer; border-radius: 2px;
    transition: all 0.15s;
  }
  .call-quick-btn:active { background: rgba(107,75,155,0.8); }

  /* Input bar */
  .call-input-bar {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
    padding: 10px 14px 14px;
    background: rgba(13,8,32,0.85);
    border-top: 1.5px solid rgba(180,120,255,0.3);
    display: flex; align-items: center; gap: 8px;
  }
  .call-input {
    flex: 1; padding: 9px 12px;
    background: rgba(255,255,255,0.08); border: 1.5px solid rgba(180,120,255,0.4);
    color: white; font-family: 'Noto Sans KR', sans-serif; font-size: 13px;
    outline: none; border-radius: 2px;
  }
  .call-input::placeholder { color: rgba(255,255,255,0.35); }
  .call-input:focus { border-color: var(--lavender); }
  .call-send-btn {
    font-family: 'Press Start 2P', monospace; font-size: 10px;
    background: var(--lavender-dark); border: 2px solid var(--border);
    box-shadow: 2px 2px 0 rgba(107,75,155,0.6);
    padding: 9px 12px; cursor: pointer; color: white; border-radius: 2px;
  }
  .call-send-btn:active { transform: translate(2px,2px); box-shadow: none; }
  .call-end-btn {
    font-family: 'Press Start 2P', monospace; font-size: 9px;
    background: #CC2244; border: 2px solid #991133;
    box-shadow: 2px 2px 0 #770022;
    padding: 9px 12px; cursor: pointer; color: white; border-radius: 2px;
    flex-shrink: 0;
  }
  .call-end-btn:active { transform: translate(2px,2px); box-shadow: none; }

  /* ========== SCENE 3: 종료 ========== */
  #scene3 {
    background: #0D0820;
    background-image:
      linear-gradient(45deg,#1A1030 25%,transparent 25%),
      linear-gradient(-45deg,#1A1030 25%,transparent 25%),
      linear-gradient(45deg,transparent 75%,#1A1030 75%),
      linear-gradient(-45deg,transparent 75%,#1A1030 75%);
    background-size: 16px 16px;
    background-position: 0 0,0 8px,8px -8px,-8px 0;
    display: flex; align-items: center; justify-content: center;
  }
  .end-box {
    width: 300px; overflow: hidden;
    background: #1A0840; border: 2.5px solid #6B4B9B;
    box-shadow: 4px 4px 0 #4B3B7B; border-radius: 2px;
    animation: popIn 0.3s ease;
  }
  @keyframes popIn { 0%{transform:scale(0.85);opacity:0} 100%{transform:scale(1);opacity:1} }
  .end-titlebar {
    background: linear-gradient(90deg, #2D1B69, #6B3B8B);
    padding: 8px 12px; border-bottom: 2px solid #6B4B9B;
    display: flex; align-items: center; gap: 5px;
  }
  .win-dot { width: 10px; height: 10px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.3); }
  .win-dot.red { background: #FF6B6B; }
  .win-dot.yellow { background: #FFD93D; }
  .win-dot.green { background: #6BCB77; }
  .end-title-text { font-family: 'Press Start 2P', monospace; font-size: 7px; color: #E8D0FF; margin-left: 4px; }
  .end-body { padding: 24px 20px; text-align: center; }
  .end-avatar {
    width: 80px; height: 80px; border-radius: 50%;
    border: 3px solid #6B4B9B; object-fit: cover; object-position: top;
    margin: 0 auto 12px; display: block;
    box-shadow: 0 0 16px rgba(140,80,220,0.5);
  }
  .end-duration {
    font-family: 'Press Start 2P', monospace; font-size: 18px;
    color: white; margin-bottom: 8px;
    text-shadow: 0 0 10px rgba(180,120,255,0.7);
  }
  .end-label {
    font-family: 'Press Start 2P', monospace; font-size: 7px;
    color: rgba(220,200,255,0.5); margin-bottom: 16px;
  }
  .end-msg {
    font-size: 14px; color: #E8D0FF; line-height: 1.7;
    background: rgba(80,40,120,0.4); border: 1.5px solid #6B4B9B;
    padding: 12px 14px; margin-bottom: 18px; border-radius: 2px;
  }
  .end-msg .char-name { font-family: 'Press Start 2P', monospace; font-size: 7px; color: var(--lavender); display: block; margin-bottom: 6px; }
  .end-btns { display: flex; gap: 8px; justify-content: center; }
  .end-btn {
    font-family: 'Press Start 2P', monospace; font-size: 7px;
    padding: 10px 14px; border: 2px solid #6B4B9B; box-shadow: 2px 2px 0 #4B3B7B;
    cursor: pointer; border-radius: 2px; color: white;
  }
  .end-btn.home { background: rgba(80,40,120,0.8); }
  .end-btn.again { background: rgba(180,60,100,0.8); border-color: #AA3366; box-shadow: 2px 2px 0 #881144; }
  .end-btn:active { transform: translate(2px,2px); box-shadow: none; }

  /* Typing indicator */
  .call-typing {
    display: flex; gap: 4px; align-items: center;
    padding: 10px 14px;
  }
  .call-typing-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--lavender);
    animation: typingBounce 1s infinite;
  }
  .call-typing-dot:nth-child(2) { animation-delay: 0.15s; }
  .call-typing-dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes typingBounce {
    0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)}
  }
</style>
</head>
<body>
<div class="phone-frame" id="phoneFrame">

  <!-- ===== SCENE 1: 연결 중 ===== -->
  <div class="scene active" id="scene1">
    <div class="s1-img-wrap">
      <div class="s1-ring"></div>
      <div class="s1-ring2"></div>
      <img src="./assets/jinwoo.png" alt="진우">
    </div>
    <p class="s1-name">진우</p>
    <div class="s1-status">
      <span style="margin-right:4px;">연결 중</span>
      <div class="connecting-dot"></div>
      <div class="connecting-dot"></div>
      <div class="connecting-dot"></div>
    </div>
    <button class="cancel-btn" onclick="location.href='character.html?char=jinwoo'">취소</button>
  </div>

  <!-- ===== SCENE 2: 영통 메인 ===== -->
  <div class="scene" id="scene2">
    <!-- Video -->
    <video class="call-video" id="callVideo"
      src="./assets/jinwoo_call.mp4"
      autoplay muted loop playsinline
      poster="./assets/jinwoo.png">
    </video>
    <div class="call-bokeh"></div>
    <div class="call-overlay"></div>

    <!-- Top bar -->
    <div class="call-topbar">
      <div class="call-badge">
        <div class="call-badge-dot"></div>
        <span class="call-badge-text">📹 팬영통</span>
      </div>
      <div class="call-timer" id="callTimer">00:00</div>
    </div>

    <!-- Chat bubbles -->
    <div class="call-chat-area" id="callChatArea"></div>

    <!-- Quick replies -->
    <div class="call-quick">
      <button class="call-quick-btn" onclick="sendCallMsg('보고싶었어')">보고싶었어</button>
      <button class="call-quick-btn" onclick="sendCallMsg('오늘 공연 어땠어?')">오늘 공연 어땠어?</button>
      <button class="call-quick-btn" onclick="sendCallMsg('나만 봐 💗')">나만 봐 💗</button>
    </div>

    <!-- Input bar -->
    <div class="call-input-bar">
      <input class="call-input" id="callInput" type="text" placeholder="메시지 입력..." maxlength="40"
        onkeydown="if(event.key==='Enter') sendCallMsg()">
      <button class="call-send-btn" onclick="sendCallMsg()">↑</button>
      <button class="call-end-btn" onclick="endCall()">📵</button>
    </div>
  </div>

  <!-- ===== SCENE 3: 통화 종료 ===== -->
  <div class="scene" id="scene3">
    <div class="end-box">
      <div class="end-titlebar">
        <span class="win-dot red"></span>
        <span class="win-dot yellow"></span>
        <span class="win-dot green"></span>
        <span class="end-title-text">call_ended.exe</span>
      </div>
      <div class="end-body">
        <img class="end-avatar" src="./assets/jinwoo.png" alt="진우">
        <p class="end-duration" id="endDuration">00:00</p>
        <p class="end-label">통화 시간</p>
        <div class="end-msg">
          <span class="char-name">● 진우</span>
          다음에 또 해요 💌<br>
          <span style="font-size:12px; color:rgba(220,200,255,0.6);">오늘도 와줘서 고마워.</span>
        </div>
        <div class="end-btns">
          <button class="end-btn home" onclick="location.href='index.html'">🏠 홈으로</button>
          <button class="end-btn again" onclick="restartCall()">📹 다시 영통</button>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
  const callPresets = [
    '와줬어? 반가워 😊',
    '오늘 많이 기다렸어?',
    '나 지금 너 보이는데... 😶',
    '목소리 듣고 싶었는데.',
    '오늘 공연... 네 생각 했어.',
    '이렇게 보니까 더 보고싶다.',
    '...나만 봐.',
    '다음에 또 해줄 거지? 💗'
  ];
  const autoPresets = [
    '오늘 많이 기다렸어? 😊',
    '...뭐해 지금',
    '나 지금 너만 보고 있어.',
    '이 시간이 좋다.',
  ];

  let presetIdx = 0;
  let timerInterval = null;
  let autoInterval = null;
  let totalSeconds = 0;
  let isTyping = false;
  let finalTime = '00:00';

  function pad(n) { return String(n).padStart(2,'0'); }
  function formatTime(s) { return pad(Math.floor(s/60)) + ':' + pad(s%60); }

  function showScene(id) {
    document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // Scene 1 → 2 auto
  setTimeout(() => {
    showScene('scene2');
    startTimer();
    startAutoMessages();
    // Initial message
    setTimeout(() => addCharBubble('와줬어? 반가워 😊'), 1000);
  }, 2000);

  function startTimer() {
    timerInterval = setInterval(() => {
      totalSeconds++;
      const t = formatTime(totalSeconds);
      document.getElementById('callTimer').textContent = t;
      finalTime = t;
    }, 1000);
  }

  function startAutoMessages() {
    let idx = 0;
    autoInterval = setInterval(() => {
      if (!isTyping) {
        addCharBubble(autoPresets[idx % autoPresets.length]);
        idx++;
      }
    }, 7000);
  }

  function addCharBubble(text) {
    const area = document.getElementById('callChatArea');
    const wrap = document.createElement('div');
    wrap.innerHTML = `
      <div class="call-bubble">
        <div class="bubble-name">● 진우</div>
        ${text}
      </div>`;
    area.appendChild(wrap);
    // Keep max 4 bubbles
    while (area.children.length > 4) area.removeChild(area.firstChild);
  }

  function addUserBubble(text) {
    const area = document.getElementById('callChatArea');
    const wrap = document.createElement('div');
    wrap.innerHTML = `<div class="call-bubble user">${text}</div>`;
    area.appendChild(wrap);
    while (area.children.length > 4) area.removeChild(area.firstChild);
  }

  function showCallTyping() {
    const area = document.getElementById('callChatArea');
    const wrap = document.createElement('div');
    wrap.id = 'callTyping';
    wrap.innerHTML = `<div class="call-bubble" style="padding:10px 14px;">
      <div class="call-typing">
        <div class="call-typing-dot"></div>
        <div class="call-typing-dot"></div>
        <div class="call-typing-dot"></div>
      </div>
    </div>`;
    area.appendChild(wrap);
  }

  function removeCallTyping() {
    const t = document.getElementById('callTyping');
    if (t) t.remove();
  }

  function sendCallMsg(quickText) {
    if (isTyping) return;
    const input = document.getElementById('callInput');
    const text = quickText || input.value.trim();
    if (!text) return;
    input.value = '';

    isTyping = true;
    addUserBubble(text);
    showCallTyping();

    setTimeout(() => {
      removeCallTyping();
      const reply = callPresets[presetIdx % callPresets.length];
      presetIdx++;
      addCharBubble(reply);
      isTyping = false;
    }, 800);
  }

  function endCall() {
    clearInterval(timerInterval);
    clearInterval(autoInterval);
    document.getElementById('endDuration').textContent = finalTime;
    // Pause video
    const v = document.getElementById('callVideo');
    if (v) v.pause();
    showScene('scene3');
  }

  function restartCall() {
    // Reset
    totalSeconds = 0; finalTime = '00:00'; presetIdx = 0; isTyping = false;
    document.getElementById('callChatArea').innerHTML = '';
    document.getElementById('callTimer').textContent = '00:00';
    const v = document.getElementById('callVideo');
    if (v) { v.currentTime = 0; v.play(); }
    showScene('scene1');
    setTimeout(() => {
      showScene('scene2');
      startTimer();
      startAutoMessages();
      setTimeout(() => addCharBubble('또 왔어? 😊'), 800);
    }, 2000);
  }
</script>
</body>
</html>
